name: Build Linux bundle (ARM64)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: build-linux-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 在 ubuntu-24.04-arm 原生编译会链接 GLIBC_2.34+，旧版统信 UOS 无法运行。
  # 改为：x64 宿主机 + QEMU + Ubuntu 20.04 arm64 容器，产物面向 glibc 2.31 系系统。
  linux-arm64:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (linux/arm64)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Build in Ubuntu 20.04 (arm64, older glibc)
        run: |
          chmod +x scripts/docker-build-linux-arm64.sh
          docker run --rm --platform linux/arm64 \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            ubuntu:20.04 \
            bash /workspace/scripts/docker-build-linux-arm64.sh

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: uos-demo-linux-arm64-bundle
          path: build/linux/arm64/release/bundle/
          retention-days: 14
