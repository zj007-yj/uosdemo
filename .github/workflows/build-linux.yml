name: Build Linux bundle (ARM64)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: build-linux-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build deps
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates curl git unzip xz-utils zip \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      # subosito/flutter-action 在部分 Linux ARM64 + stable 组合下会报
      # “Unable to determine Flutter version … architecture: arm64”。
      # 与官方仓库 clone + precache 更稳（与 Docker 内构建方式一致）。
      - name: Install Flutter from git (stable)
        run: |
          set -eux
          git clone https://github.com/flutter/flutter.git -b stable --depth 1 "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Flutter version
        run: |
          set -eux
          flutter --version
          flutter doctor -v

      - name: Enable Linux desktop & precache
        run: |
          set -eux
          flutter config --no-analytics
          flutter config --enable-linux-desktop
          flutter precache --linux

      - name: Dependencies
        run: flutter pub get

      - name: Build release bundle (linux-arm64)
        run: flutter build linux --release

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: uos-demo-linux-arm64-bundle
          path: build/linux/arm64/release/bundle/
          retention-days: 14
